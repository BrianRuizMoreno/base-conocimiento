version: "3.8"

services:
  rag-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: rag-backend:latest
    container_name: rag-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ADMIN_PIN_HASH=${ADMIN_PIN_HASH}
      - SECRET_KEY=${SECRET_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - CORS_ORIGINS=https://conocimiento.automatizaciones-physis.cloud
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-524288000}
      - UPLOAD_DIR=/app/data
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - DEFAULT_TEMPERATURE=${DEFAULT_TEMPERATURE:-0.2}
      - DEFAULT_TOP_P=${DEFAULT_TOP_P:-0.6}
      - DEFAULT_MAX_TOKENS=${DEFAULT_MAX_TOKENS:-2048}
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL:-}
    volumes:
      - ./data:/app/data
    networks:
      - PhysisNet
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rag-backend.rule=Host(`conocimiento.automatizaciones-physis.cloud`) && PathPrefix(`/api`)"
      - "traefik.http.routers.rag-backend.entrypoints=websecure"
      - "traefik.http.routers.rag-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.rag-backend.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.rag-backend-stripprefix.stripprefix.prefixes=/api"
      - "traefik.http.routers.rag-backend.middlewares=rag-backend-stripprefix"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  rag-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: rag-frontend:latest
    container_name: rag-frontend
    restart: unless-stopped
    depends_on:
      - rag-backend
    networks:
      - PhysisNet
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rag-frontend.rule=Host(`conocimiento.automatizaciones-physis.cloud`)"
      - "traefik.http.routers.rag-frontend.entrypoints=websecure"
      - "traefik.http.routers.rag-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.rag-frontend.loadbalancer.server.port=80"

networks:
  PhysisNet:
    external: true

volumes:
  rag-data:
